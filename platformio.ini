; LilyGo T5 4.7" E-Paper V2.3 (ESP32-S3) — Smart Photo Frame + Metrics Dashboard
; Board: T5-ePaper-S3 (definition in ./boards/T5-ePaper-S3.json)
;
; Build firmware : pio run
; Flash firmware : pio run -t upload
; Serial monitor : pio device monitor
;
; The web UI is embedded in the firmware (PROGMEM), so a single `upload`
; is all you need. LittleFS holds only uploaded photos + settings.json.

[env:T5-ePaper-S3]
platform = espressif32@6.12.0
board = T5-ePaper-S3
framework = arduino

board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; ESPAsyncWebServer task tuning
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#esp32s3
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    bblanchon/ArduinoJson@^7.2.0
    Wire
    SPI

; ---- Over-the-air upload (after the first USB flash) ----
; Usage: pio run -e T5-ePaper-S3-ota -t upload
[env:T5-ePaper-S3-ota]
extends = env:T5-ePaper-S3
upload_protocol = espota
upload_port = t5frame.local
